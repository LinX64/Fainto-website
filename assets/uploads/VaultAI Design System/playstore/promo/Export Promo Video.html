<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultAI — Promo Video Exporter</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden;
    font-family: "Sora", system-ui, sans-serif; }
  #root { position: fixed; inset: 0; }
  #panel { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999;
    display: flex; gap: 10px; align-items: center; background: rgba(8,18,12,0.9);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; padding: 8px 10px 8px 16px;
    backdrop-filter: blur(8px); color: #cfe9dd; font-size: 13px; }
  #panel b { color: #36F0AB; }
  #panel button { border: none; cursor: pointer; font-weight: 700; font-size: 13px;
    padding: 9px 16px; border-radius: 999px; font-family: inherit; }
  #recBtn { background: #36F0AB; color: #05231a; }
  #fsBtn { background: rgba(255,255,255,0.08); color: #e6f3ec; }
  #status { font-size: 12px; color: rgba(207,233,221,0.7); min-width: 160px; }
  .rec-on #panel { display: none; }
</style>
</head>
<body>
<div id="panel">
  <span>VaultAI promo · <b>1920×1080</b></span>
  <button id="fsBtn">⤢ Fullscreen</button>
  <button id="recBtn">● Record .webm</button>
  <span id="status">Maximize the window, then Record.</span>
</div>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

<!-- record mode = no scrubber, plays once -->
<script>window.__RECORD__ = true;</script>

<script>
(async function () {
  const statusEl = document.getElementById('status');

  // Load + transpile the promo (classic runtime so it emits React.createElement).
  try {
    const src = await (await fetch('animations.jsx')).text();
    const code = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    const s = document.createElement('script');
    s.textContent = code;
    document.body.appendChild(s);
  } catch (e) {
    statusEl.textContent = 'Could not load animations.jsx — serve this folder over http://localhost.';
    return;
  }
  if (!window.VaultPromo) { statusEl.textContent = 'Promo failed to load (see console).'; return; }

  ReactDOM.createRoot(document.getElementById('root'))
    .render(React.createElement(window.VaultPromo));

  document.getElementById('fsBtn').onclick = () =>
    document.documentElement.requestFullscreen?.();

  document.getElementById('recBtn').onclick = async () => {
    if (!navigator.mediaDevices?.getDisplayMedia) {
      statusEl.textContent = 'Screen capture needs http://localhost (see guide).';
      return;
    }
    let stream;
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: 30, width: 1920, height: 1080 }, audio: false,
        preferCurrentTab: true,
      });
    } catch (e) { statusEl.textContent = 'Capture cancelled.'; return; }

    const mime = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']
      .find(m => MediaRecorder.isTypeSupported(m));
    const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 16000000 });
    const chunks = [];
    rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    rec.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'vaultai-promo.webm';
      a.click();
      stream.getTracks().forEach(t => t.stop());
      document.body.classList.remove('rec-on');
      statusEl.textContent = 'Saved vaultai-promo.webm ✓';
    };

    document.body.classList.add('rec-on');            // hide the panel from the recording
    window.dispatchEvent(new KeyboardEvent('keydown', { key: '0', code: 'Home' })); // reset to 0
    await new Promise(r => setTimeout(r, 250));
    rec.start();
    const dur = (window.PROMO_DURATION || 29) * 1000 + 400;
    setTimeout(() => rec.stop(), dur);
  };
})();
</script>
</body>
</html>
