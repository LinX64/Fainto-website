name: Deploy to cPanel

# Auto-push the site to Namecheap cPanel on every commit to master.
#
# Why lftp instead of an FTP-Deploy-Action: cPanel's FTPS server (ProFTPd/Pure-FTPd)
# requires the data connection to REUSE the control channel's TLS session. The action's
# bundled basic-ftp 5.x can't resume a TLS 1.3 data session, so the server drops it with
# "Server sent FIN packet unexpectedly" on the very first file. lftp reuses the session
# correctly, and we pin TLS 1.2 to be safe. It also retries where basic-ftp gives up.
#
# Setup (one time): repo → Settings → Secrets and variables → Actions → Secrets:
#   FTP_SERVER    e.g. serverXXX.web-hosting.com   (the Namecheap server host, not domain)
#   FTP_USERNAME  the MAIN cPanel account user (e.g. fainvimc) so login lands in
#                 /home/<acct>/ and the public_html/ target below resolves to the ROOT
#                 docroot /home/<acct>/public_html. A per-domain FTP account such as
#                 admin@fainto.app is JAILED to /home/<acct>/fainto.app/admin/ and would
#                 deposit the whole site at fainto.app/admin/public_html (the wrong path).
#   FTP_PASSWORD  that account's password            (avoid " ` \ chars in it)
# The mirror target (public_html/) is RELATIVE to the FTP login's landing directory.
# The `pwd` line below prints that landing dir to the run log — confirm it is /home/<acct>.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: deploy-cpanel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Sync to cPanel over FTPS (TLS 1.2, session reuse)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set ssl:priority "NORMAL:-VERS-TLS1.3"
          set net:max-retries 3
          set net:persist-retries 3
          set net:reconnect-interval-base 5
          set ftp:use-mdtm off
          open "ftp://$FTP_SERVER"
          user "$FTP_USERNAME" "$FTP_PASSWORD"
          pwd
          mirror -R --only-newer --parallel=1 --verbose \
            --exclude-glob '*.md' \
            --exclude '\.git' \
            --exclude '\.github/' \
            --exclude 'graphify-out/' \
            ./ public_html/
          bye
          EOF
