<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fainto Dashboard — your finances, big screen</title>
<meta name="description" content="Your Fainto financial data, rendered locally. Nothing is uploaded.">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://fainto.app/web/dashboard.html">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fainto">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#33333D" media="(prefers-color-scheme: dark)">
<script>
/* Theme must be applied before first paint. The main IIFE at the end of <body> sits behind
 * a render-blocking dashboard-core.js, so applying it there flashes the OS theme first for
 * anyone whose stored choice differs. Same head-script pattern as index.html. */
(function () {
  try {
    var t = localStorage.getItem('fainto_dashboard_theme') || localStorage.getItem('fainto-theme');
    if (t === 'light' || t === 'dark') {
      document.documentElement.setAttribute('data-theme', t);
      var metas = document.querySelectorAll('meta[name="theme-color"]');
      var color = t === 'light' ? '#F5F5F7' : '#33333D';
      for (var i = 0; i < metas.length; i++) metas[i].setAttribute('content', color);
    }
  } catch (e) { /* storage unavailable */ }
}());
</script>
<style>
@font-face {
  font-family: 'Lexend';
  font-style: normal;
  font-weight: 300 600;
  font-display: swap;
  src: url('/assets/fonts/lexend-latin.woff2') format('woff2');
  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329,
    U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
}
@font-face {
  font-family: 'Lexend';
  font-style: normal;
  font-weight: 300 600;
  font-display: swap;
  src: url('/assets/fonts/lexend-latin-ext.woff2') format('woff2');
  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF,
    U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
}

:root {
  --acc-brand: #6D28D9;
  --acc-income: #047857;
  --acc-spend: #C2410C;
  --acc-savings: #B45309;
  --acc-alert: #6A1B9A;

  --green: var(--acc-income);
  --green-deep: #0E6C40;
  --green-deepest: #065F46;
  --orange: var(--acc-spend);
  --orange-deep: #9A3412;
  --yellow: var(--acc-savings);
  --yellow-deep: #92400E;
  --purple: var(--acc-alert);
  --purple-deep: #3730A3;
  --lavender: #4F378B;
  --rose: #9F1239;

  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --surface-2: #F9F9FB;
  --surface-3: #ECECEE;
  --surface-4: #E3E3E6;
  --line: #E3E3E6;
  --outline: #D1D1D6;
  --text: #1C1C1E;
  --muted: #636368;
  --chrome: #1C1C1E;
  --on-chrome: #FFFFFF;

  --ease-emph-dec: cubic-bezier(0.05, 0.7, 0.1, 1);
  --ease-emph-acc: cubic-bezier(0.3, 0, 0.8, 0.15);
  --ease-std: cubic-bezier(0.2, 0, 0, 1);

  --sp-1: 8px;
  --sp-2: 12px;
  --sp-3: 16px;
  --sp-4: 24px;
  --sp-5: 32px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --acc-brand: #72DEFF;
    --acc-income: #36F0AB;
    --acc-spend: #FF6859;
    --acc-savings: #FFCF44;
    --acc-alert: #B15DFF;

    --green-deep: #21AF6C;
    --green-deepest: #0E6C40;
    --orange-deep: #FD9C12;
    --yellow-deep: #FDE68A;
    --purple-deep: #9600FF;
    --lavender: #D0BCFF;
    --rose: #FB7185;

    --bg: #33333D;
    --surface: #373741;
    --surface-2: #3F3F49;
    --surface-3: #474751;
    --surface-4: #474751;
    --line: rgba(174, 174, 177, 0.2);
    --outline: #8F8F99;
    --text: #FFFFFF;
    --muted: #AEAEB1;
    --chrome: #FFFFFF;
    --on-chrome: #2A2931;
  }
}

:root[data-theme="light"] {
  --acc-brand: #6D28D9;
  --acc-income: #047857;
  --acc-spend: #C2410C;
  --acc-savings: #B45309;
  --acc-alert: #6A1B9A;

  --green-deep: #0E6C40;
  --green-deepest: #065F46;
  --orange-deep: #9A3412;
  --yellow-deep: #92400E;
  --purple-deep: #3730A3;
  --lavender: #4F378B;
  --rose: #9F1239;

  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --surface-2: #F9F9FB;
  --surface-3: #ECECEE;
  --surface-4: #E3E3E6;
  --line: #E3E3E6;
  --outline: #D1D1D6;
  --text: #1C1C1E;
  --muted: #636368;
  --chrome: #1C1C1E;
  --on-chrome: #FFFFFF;
}

:root[data-theme="dark"] {
  --acc-brand: #72DEFF;
  --acc-income: #36F0AB;
  --acc-spend: #FF6859;
  --acc-savings: #FFCF44;
  --acc-alert: #B15DFF;

  --green-deep: #21AF6C;
  --green-deepest: #0E6C40;
  --orange-deep: #FD9C12;
  --yellow-deep: #FDE68A;
  --purple-deep: #9600FF;
  --lavender: #D0BCFF;
  --rose: #FB7185;

  --bg: #33333D;
  --surface: #373741;
  --surface-2: #3F3F49;
  --surface-3: #474751;
  --surface-4: #474751;
  --line: rgba(174, 174, 177, 0.2);
  --outline: #8F8F99;
  --text: #FFFFFF;
  --muted: #AEAEB1;
  --chrome: #FFFFFF;
  --on-chrome: #2A2931;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
}

body {
  font-family: 'Lexend', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 18px;
  line-height: 1.6;
  font-variant-numeric: lining-nums tabular-nums;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

::selection { background: var(--acc-brand); color: var(--on-chrome); }

.tnum { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum' 1; }

a { color: inherit; }

button {
  font-family: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
}

a:focus-visible,
button:focus-visible,
input:focus-visible,
select:focus-visible {
  outline: 2px solid var(--chrome);
  outline-offset: 2px;
}

.wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: var(--sp-3) var(--sp-3) var(--sp-5);
}

header.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-3) 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: var(--sp-4);
}

.brand {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.brand img {
  width: 32px;
  height: 32px;
  display: block;
}

.brand .name {
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.01em;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.icon-btn {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--muted);
  transition: background 150ms var(--ease-std), border-color 150ms var(--ease-std), color 150ms var(--ease-std);
}

.icon-btn:hover {
  color: var(--text);
  background: var(--surface-2);
  border-color: var(--outline);
}

.icon-btn:active { background: var(--surface-2); }

.icon-btn svg { width: 20px; height: 20px; }

a.brand { text-decoration: none; color: inherit; }
.top-link {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 16px;
  min-height: 40px;
  display: inline-flex;
  align-items: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  background: transparent;
  cursor: pointer;
  text-decoration: none;
  transition: background 150ms var(--ease-std), border-color 150ms var(--ease-std), color 150ms var(--ease-std);
}
.top-link:hover { color: var(--text); background: var(--surface-2); border-color: var(--outline); }
.top-link:active { background: var(--surface-2); border-color: var(--outline); }
/* `display: inline-flex` above outranks the UA `[hidden] { display: none }` rule. */
.top-link[hidden] { display: none; }

footer.bottom {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  padding: var(--sp-4) 0 var(--sp-3);
}

.foot-link {
  font: inherit;
  color: var(--muted);
  background: none;
  border: 0;
  padding: 0 0 0 var(--sp-1);
  text-decoration: underline;
  cursor: pointer;
}
.foot-link:hover { color: var(--text); }

/* ---- shared card / section system ---- */

.card {
  background: var(--surface);
  border: 1px solid var(--line);
  padding: var(--sp-4);
  margin-bottom: var(--sp-3);
}

.section-label {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: 22px;
  letter-spacing: 0.002em;
  color: var(--text);
  font-weight: 500;
  margin: 0 0 var(--sp-3);
}

.section-label svg {
  width: 20px;
  height: 20px;
  flex: none;
  color: var(--muted);
}

.hero-amount {
  font-size: clamp(38px, 6vw, 48px);
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.1;
  margin: 0 0 var(--sp-2);
  font-variant-numeric: lining-nums tabular-nums;
  font-feature-settings: 'tnum' 1;
}
/* Scale the figure to its own card so a long amount never wraps mid-number in a narrow column. */
@supports (container-type: inline-size) {
  .card { container-type: inline-size; }
  .hero-amount { font-size: clamp(24px, 14cqw, 48px); }
}

#sec-overview .hero-amount { color: var(--acc-brand); }

.hero-caption {
  font-size: 16px;
  color: var(--muted);
  margin: 0 0 var(--sp-3);
}

.spark {
  display: flex;
  width: 100%;
  height: 2px;
  gap: 2px;
  margin-bottom: var(--sp-3);
  background: var(--line);
  overflow: hidden;
}

.spark > span {
  display: block;
  height: 100%;
  transform: scaleX(0);
  transform-origin: left;
}

.spark.revealed > span {
  transform: scaleX(1);
  transition: transform 1000ms var(--ease-emph-dec);
}

.diverging {
  position: relative;
  width: 100%;
  height: 10px;
  background: var(--line);
  margin-bottom: var(--sp-1);
  display: flex;
  overflow: hidden;
}

.diverging .half {
  width: 50%;
  height: 100%;
  position: relative;
}

.diverging .half.left { display: flex; justify-content: flex-end; }
.diverging .half.right { display: flex; justify-content: flex-start; }

.diverging .bar {
  height: 100%;
  transform: scaleX(0);
}

.diverging .half.left .bar { transform-origin: right; }
.diverging .half.right .bar { transform-origin: left; }

.diverging.revealed .bar {
  transform: scaleX(1);
  transition: transform 1000ms var(--ease-emph-dec);
}

.diverging-caption {
  font-size: 15px;
  color: var(--muted);
  margin: 0 0 var(--sp-3);
}

.cashflow-line {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--sp-2);
  font-size: 16px;
  color: var(--muted);
  padding-top: var(--sp-2);
  border-top: 1px solid var(--line);
}

.cashflow-line b { color: var(--text); font-weight: 600; }
.cashflow-line b.in { color: var(--green); }
.cashflow-line b.out { color: var(--orange); }

.dot { width: 8px; height: 8px; display: inline-block; flex: none; }

.rows { display: flex; flex-direction: column; }

.row {
  display: flex;
  align-items: center;
  padding: 14px 0;
  border-top: 1px solid var(--line);
  gap: var(--sp-2);
}

.rows .row:first-child { border-top: none; }

.row .accent-bar {
  width: 4px;
  align-self: stretch;
  flex: none;
}

.fic { display: block; }
.row .row-icon { flex: none; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; background: var(--surface-2); }
.row .row-icon .fic { width: 18px; height: 18px; }

@media (min-width: 760px) {
  #sec-transactions .rows { display: grid; grid-template-columns: 1fr 1fr; column-gap: var(--sp-4); }
  #sec-transactions .rows .row:nth-child(2) { border-top: none; }
}

.row .row-main {
  flex: 1 1 auto;
  min-width: 0;
}

.row .row-name {
  font-size: 18px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.row .row-desc {
  font-size: 15px;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.row .row-amount {
  font-size: 20px;
  font-weight: 600;
  font-variant-numeric: lining-nums tabular-nums;
  font-feature-settings: 'tnum' 1;
  flex: none;
  text-align: right;
}

.row .row-amount .badge {
  display: block;
  font-size: 13px;
  color: var(--muted);
  font-weight: 400;
  text-align: right;
}

.row .chevron {
  color: var(--muted);
  flex: none;
  width: 16px;
  height: 16px;
}

.show-all {
  margin-top: var(--sp-2);
  margin-left: -12px;
  min-height: 48px;
  display: inline-flex;
  align-items: center;
  padding: 0 12px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--acc-brand);
  border: none;
  border-radius: 0;
  align-self: flex-start;
  transition: background 150ms var(--ease-std);
}

.show-all:hover {
  background: var(--surface-2);
}

.progress-track {
  width: 100%;
  height: 3px;
  background: var(--line);
  margin-top: 6px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  transform: scaleX(0);
  transform-origin: left;
}

.progress-track.revealed .progress-fill {
  transform: scaleX(1);
  transition: transform 1000ms var(--ease-emph-dec);
}

.empty-row {
  padding: var(--sp-3) 0;
  color: var(--muted);
  font-size: 16px;
  border-top: 1px solid var(--line);
}

.rows .empty-row:first-child { border-top: none; }

/* ---- empty state ---- */

.empty-card {
  text-align: center;
  padding: var(--sp-5) var(--sp-4);
}

.empty-mark { margin-bottom: var(--sp-3); }
.empty-mark img { display: inline-block; border-radius: 0; }

.empty-title {
  font-size: clamp(30px, 4.5vw, 40px);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 0 0 var(--sp-2);
}

.empty-sub {
  font-size: 18px;
  color: var(--muted);
  margin: 0 auto var(--sp-4);
  max-width: 52ch;
}

.empty-error {
  font-size: 16px;
  color: var(--acc-spend);
  margin: 0 0 var(--sp-3);
}

.empty-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-3);
  flex-wrap: wrap;
}

.btn-primary, .btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 12px 26px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  border-radius: 999px;
  border: 1px solid var(--chrome);
  transition: background 150ms var(--ease-std), border-color 150ms var(--ease-std), color 150ms var(--ease-std);
}

.btn-primary { background: var(--chrome); color: var(--on-chrome); }
.btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--outline); }
.btn-secondary:hover { background: var(--surface-2); }

/* ---- import notice ---- */

.import-note {
  background: var(--surface);
  border: 1px solid var(--line);
  border-left: 4px solid var(--acc-income);
  padding: var(--sp-2) var(--sp-3);
  margin: 0 0 var(--sp-3);
  font-size: 15px;
  color: var(--muted);
}

/* ---- fade-rise stagger ---- */

.card.stagger {
  opacity: 0;
  transform: translateY(8px);
}

.card.stagger.in {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 300ms var(--ease-emph-dec), transform 300ms var(--ease-emph-dec);
}

/* ---- transactions section ---- */

.tx-controls {
  display: flex;
  gap: var(--sp-2);
  margin-bottom: var(--sp-3);
  flex-wrap: wrap;
}

.tx-search {
  flex: 1 1 240px;
  min-height: 48px;
  padding: 12px 16px;
  font-size: 17px;
  font-family: inherit;
  color: var(--text);
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 0;
}

.tx-sort {
  min-height: 48px;
  padding: 12px 16px;
  font-size: 17px;
  font-family: inherit;
  color: var(--text);
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 0;
}

.tx-search:focus-visible,
.tx-sort:focus-visible {
  outline: 2px solid var(--chrome);
  outline-offset: -1px;
}

.tx-pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: var(--sp-3);
  font-size: 15px;
  color: var(--muted);
}

.tx-pagination button {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 18px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  transition: background 150ms var(--ease-std), border-color 150ms var(--ease-std);
}

.tx-pagination button:not(:disabled):hover {
  background: var(--surface-2);
  border-color: var(--outline);
}

.tx-pagination button:disabled {
  color: var(--muted);
  cursor: default;
  opacity: 0.5;
}

/* ---- desktop layout: app-like "See all" grid ---- */

@media (min-width: 720px) {
  #app {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--sp-3);
    align-items: stretch;
    margin-bottom: var(--sp-3);
  }

  #app > * { margin-bottom: 0; }

  #sec-overview,
  #sec-budgets,
  #sec-transactions,
  .empty-card,
  .import-note { grid-column: 1 / -1; }

  #sec-accounts,
  #sec-bills,
  #sec-budgets {
    display: flex;
    flex-direction: column;
  }

  #sec-accounts .rows,
  #sec-bills .rows,
  #sec-budgets .rows { flex: 1 1 auto; }
}

@media (min-width: 1100px) {
  .wrap { max-width: 1240px; }

  #app { grid-template-columns: repeat(3, minmax(0, 1fr)); }

  #sec-budgets { grid-column: auto; }

  #sec-overview {
    display: grid;
    grid-template-columns: minmax(0, 5fr) minmax(0, 7fr);
    column-gap: var(--sp-5);
  }

  #sec-overview .section-label { grid-column: 1 / -1; grid-row: 1; }
  #sec-overview .hero-amount { grid-column: 1; grid-row: 2 / 5; align-self: center; margin: 0; }
  #sec-overview .diverging { grid-column: 2; grid-row: 2; align-self: end; }
  #sec-overview .diverging-caption { grid-column: 2; grid-row: 3; }
  #sec-overview .cashflow-line { grid-column: 2; grid-row: 4; align-self: end; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  .card.stagger { opacity: 1; transform: none; }
  .spark > span, .diverging .bar, .progress-fill { transform: scaleX(1) !important; }
}

/* ---------- print (statement view: plain black-on-white) ---------- */
@media print {
  body { background: white; color: black; }
  header.top, footer.bottom, .top-actions, #themeToggle { display: none; }
}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <a class="brand" href="/" aria-label="Back to fainto.app">
      <svg class="mark" width="32" height="32" viewBox="0 0 108 108" role="img" aria-label="Fainto"><circle cx="54" cy="54" r="54" fill="#FDFDFD"/><path fill="#1E2024" d="M25.02,54 A28.98,28.98 0 0 1 54,25.02 L54,40.89 A13.11,13.11 0 0 0 40.89,54 Z"/><path fill="#474B53" d="M54,25.02 L73.32,25.02 A9.66,9.66 0 0 1 82.98,34.68 L82.98,54 L67.11,54 A13.11,13.11 0 0 0 54,40.89 Z"/><path fill="#606672" d="M82.98,54 A28.98,28.98 0 0 1 54,82.98 L54,67.11 A13.11,13.11 0 0 0 67.11,54 Z"/><path fill="#282B31" d="M54,82.98 A28.98,28.98 0 0 1 25.02,54 L40.89,54 A13.11,13.11 0 0 0 54,67.11 Z"/></svg>
      <span class="name">Fainto</span>
    </a>
    <div class="top-actions">
      <a class="top-link" href="./app.html?mode=connect" id="dashReconnect" hidden>Reconnect</a>
      <a class="top-link" href="./app.html?mode=signin" id="dashSignin" hidden>Sign in</a>
      <button class="top-link" id="dashExport" type="button" hidden>Export CSV</button>
      <button class="top-link" id="dashSignout" type="button" hidden>Disconnect</button>
      <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle light/dark theme" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
      </button>
    </div>
  </header>

  <main id="app" role="main">
  </main>

  <footer class="bottom">
    Fainto — processed entirely on this device. Nothing is uploaded.
    <button class="foot-link" id="whatsNew" type="button">What&rsquo;s new</button>
  </footer>
</div>

<script src="dashboard-core.js?v=20260719"></script>
<script src="changelog.js?v=20260719"></script>
<script>
(function () {
  'use strict';

  var THEME_KEY = 'fainto_dashboard_theme';
  var THEME_KEY_ALT = 'fainto-theme';
  var themeMetas = document.querySelectorAll('meta[name="theme-color"]');
  function syncThemeMeta(theme) {
    var color = theme === 'light' ? '#F5F5F7' : '#33333D';
    for (var i = 0; i < themeMetas.length; i++) themeMetas[i].setAttribute('content', color);
  }
  function applyStoredTheme() {
    var stored = null;
    try { stored = localStorage.getItem(THEME_KEY) || localStorage.getItem(THEME_KEY_ALT); } catch (e) { stored = null; }
    if (stored === 'light' || stored === 'dark') {
      document.documentElement.setAttribute('data-theme', stored);
      syncThemeMeta(stored);
    }
  }
  applyStoredTheme();

  var dashSignout = document.getElementById('dashSignout');
  var dashReconnect = document.getElementById('dashReconnect');
  var dashSignin = document.getElementById('dashSignin');
  var dashExport = document.getElementById('dashExport');
  // The bundle currently on screen (connected, local-file, or CSV-imported) — kept only so
  // "Export CSV" has something to serialize; never sent anywhere, just read back into a Blob.
  var currentBundle = null;

  // The header is state-driven: this page has no Firebase, so "connected" means
  // a paired bundle is in sessionStorage. Showing Disconnect/Reconnect to a
  // signed-out visitor (or to someone who just opened a local file) is a lie.
  //   'connected' — paired/signed-in bundle in sessionStorage
  //   'local'     — a file the visitor opened in this tab; nothing to disconnect
  //   'empty'     — nothing loaded; only offer the way in
  function setHeaderState(state) {
    if (dashReconnect) dashReconnect.hidden = state !== 'connected';
    if (dashSignin) dashSignin.hidden = state === 'connected';
    if (dashSignout) {
      dashSignout.hidden = state === 'empty';
      dashSignout.textContent = state === 'local' ? 'Close file' : 'Disconnect';
    }
    if (dashExport) dashExport.hidden = state === 'empty';
    if (state === 'empty') currentBundle = null;
  }

  if (dashSignout) {
    dashSignout.addEventListener('click', function () {
      // A locally-opened file never touched Firebase — just drop it in-tab.
      if (dashSignout.textContent === 'Close file') {
        renderEmptyState(null); // resets the header to the 'empty' state
        return;
      }
      // This viewer is offline (no Firebase). Drop the in-tab data and hand off to
      // app.html, which performs the actual Firebase sign-out.
      try { sessionStorage.removeItem('fainto_bundle'); } catch (e) {}
      // Wipe the rendered data before navigating so a Back-button (bfcache) restore
      // can't re-expose it after sign-out.
      var app = document.getElementById('app');
      if (app) app.innerHTML = '';
      location.href = './app.html?signout=1';
    });
  }

  document.getElementById('themeToggle').addEventListener('click', function () {
    var current = document.documentElement.getAttribute('data-theme');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var isDark = current ? current === 'dark' : prefersDark;
    var next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    syncThemeMeta(next);
    try {
      localStorage.setItem(THEME_KEY, next);
      localStorage.setItem(THEME_KEY_ALT, next);
    } catch (e) { /* storage unavailable */ }
  });

  // Shared, first-party render core loaded above from dashboard-core.js.
  // This page stays the READ-ONLY offline viewer: it never passes interactive
  // callbacks and never touches Firebase (connect-src 'none').
  var core = window.FaintoDashboard;
  var appEl = document.getElementById('app');

  // Kept local: the retained glue (renderEmptyState / showImportNotice) needs it
  // and the render core does not expose an escapeHtml.
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      switch (c) {
        case '&': return '&amp;';
        case '<': return '&lt;';
        case '>': return '&gt;';
        case '"': return '&quot;';
        default: return '&#39;';
      }
    });
  }

  // True when a sanitized bundle actually carries at least one Fainto section.
  function hasAnyData(b) {
    if (!b) return false;
    var nw = b.netWorth || {};
    return (b.transactions && b.transactions.length > 0) ||
      (nw.assets && nw.assets.length > 0) ||
      (nw.liabilities && nw.liabilities.length > 0) ||
      (b.budgets && b.budgets.length > 0) ||
      (b.bills && b.bills.length > 0);
  }

  function resolveFromSession() {
    var raw = null;
    try { raw = sessionStorage.getItem('fainto_bundle'); } catch (e) { return null; }
    if (!raw) return null;
    try {
      var parsed = JSON.parse(raw);
      return core.sanitizeBundle(parsed);
    } catch (e) {
      return null;
    }
  }

  function showImportNotice(message) {
    var existing = appEl.querySelector('.import-note');
    if (existing) existing.parentNode.removeChild(existing);
    var note = document.createElement('p');
    note.className = 'import-note';
    note.innerHTML = escapeHtml(message);
    appEl.insertBefore(note, appEl.firstChild);
  }

  function renderEmptyState(errorMessage) {
    setHeaderState('empty');
    appEl.innerHTML =
      '<section class="card empty-card">' +
        '<div class="empty-mark">' +
          '<svg class="mark" width="48" height="48" viewBox="0 0 108 108" aria-hidden="true"><circle cx="54" cy="54" r="54" fill="#FDFDFD"/><path fill="#1E2024" d="M25.02,54 A28.98,28.98 0 0 1 54,25.02 L54,40.89 A13.11,13.11 0 0 0 40.89,54 Z"/><path fill="#474B53" d="M54,25.02 L73.32,25.02 A9.66,9.66 0 0 1 82.98,34.68 L82.98,54 L67.11,54 A13.11,13.11 0 0 0 54,40.89 Z"/><path fill="#606672" d="M82.98,54 A28.98,28.98 0 0 1 54,82.98 L54,67.11 A13.11,13.11 0 0 0 67.11,54 Z"/><path fill="#282B31" d="M54,82.98 A28.98,28.98 0 0 1 25.02,54 L40.89,54 A13.11,13.11 0 0 0 54,67.11 Z"/></svg>' +
        '</div>' +
        '<h1 class="empty-title">See your finances on the big screen</h1>' +
        '<p class="empty-sub">Connect from the Fainto app, or open an export / bank CSV &mdash; read entirely in this browser, nothing uploaded.</p>' +
        (errorMessage ? '<p class="empty-error">' + escapeHtml(errorMessage) + '</p>' : '') +
        '<div class="empty-actions">' +
          '<button type="button" class="btn-primary" id="fileOpenBtn">Open export (JSON) or bank CSV</button>' +
          '<input type="file" id="fileInput" accept=".json,.csv,application/json,text/csv" style="display:none">' +
          '<a class="btn-secondary" href="./app.html">Connect / sign in</a>' +
        '</div>' +
      '</section>';

    var input = document.getElementById('fileInput');
    var fileOpenBtn = document.getElementById('fileOpenBtn');
    if (fileOpenBtn) fileOpenBtn.addEventListener('click', function () { input.click(); }); // keyboard-operable
    input.addEventListener('change', function (evt) {
      var file = evt.target.files && evt.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        var text = String(reader.result || '');
        if (/\.csv$/i.test(file.name || '')) {
          var result = core.parseCsvToBundle(text);
          if (result.bundle) {
            setHeaderState('local');
            currentBundle = result.bundle;
            core.renderDashboard(appEl, result.bundle, { interactive: false });
            showImportNotice('Imported ' + result.imported + ' transactions · ' + result.skipped + ' rows skipped');
          } else {
            renderEmptyState(result.error || 'Could not read the CSV file.');
          }
          return;
        }
        var bundle = core.resolveFromFileText(text);
        // sanitizeBundle defaults every field, so ANY JSON object survives it — package.json
        // would open as a valid-looking all-zero dashboard. Require at least one real Fainto
        // section before we claim the file is an export.
        if (bundle && !hasAnyData(bundle)) bundle = null;
        if (bundle) {
          setHeaderState('local');
          currentBundle = bundle;
          core.renderDashboard(appEl, bundle, { interactive: false });
        } else {
          renderEmptyState('The selected file was not a valid Fainto export.');
        }
      };
      reader.onerror = function () {
        renderEmptyState('Could not read the selected file.');
      };
      reader.readAsText(file);
    });
  }

  // "Save a copy" of the data already in this tab, before it disappears with the session
  // (sessionStorage.fainto_bundle is wiped on disconnect / tab close). Fully client-side —
  // a Blob + same-origin download link, no network call, consistent with the offline posture.
  function csvField(v) {
    var s = String(v == null ? '' : v);
    return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }
  function transactionsToCsv(bundle) {
    var currency = (bundle.financialProfile && bundle.financialProfile.currency) || 'PLN';
    var lines = [['Date', 'Type', 'Category', 'Amount', 'Currency', 'Note'].map(csvField).join(',')];
    (bundle.transactions || []).forEach(function (t) {
      var d = new Date(t.timestampMillis);
      var iso = isFinite(d.getTime()) ? d.toISOString().slice(0, 10) : '';
      lines.push([iso, t.type || '', t.category || '', t.amount != null ? t.amount : '', currency, t.note || ''].map(csvField).join(','));
    });
    return lines.join('\r\n');
  }
  if (dashExport) dashExport.addEventListener('click', function () {
    if (!currentBundle || !currentBundle.transactions || !currentBundle.transactions.length) return;
    var blob = new Blob([transactionsToCsv(currentBundle)], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'fainto-transactions-' + new Date().toISOString().slice(0, 10) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  });

  function boot() {
    // ?open= is an explicit "I want to open a file" intent from the web start page. It has
    // to win over a bundle left in sessionStorage by an earlier pairing, or a tab that has
    // ever paired can never reach the file picker again.
    var wantsOpen = /[?&]open=/.test(location.search);
    var bundle = wantsOpen ? null : resolveFromSession();
    if (bundle) {
      setHeaderState('connected');
      currentBundle = bundle;
      core.renderDashboard(appEl, bundle, { interactive: false });
    } else if (wantsOpen) {
      setHeaderState('empty');
      renderEmptyState(null);
    } else {
      location.replace('./');
    }
  }

  boot();

  // Back-button (bfcache) restore does not re-run this script, so a page frozen while it
  // still held data would come back showing that data under a "connected" header even
  // though Disconnect already cleared the session. Re-run the state machine on restore.
  window.addEventListener('pageshow', function (evt) {
    if (evt.persisted) boot();
  });

  // "What's new" — the Android release-notes dialog, ported. Auto-shows once per version;
  // the footer link reopens it on demand.
  if (window.FaintoChangelog) {
    var whatsNew = document.getElementById('whatsNew');
    if (whatsNew) whatsNew.addEventListener('click', window.FaintoChangelog.open);
    window.FaintoChangelog.maybeShow();
  }
}());
</script>
</body>
</html>
